name: Go
on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go_version: ['1.18', '1.17']
        os: ['ubuntu-latest', 'ubuntu-24.04']
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U root -d root"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go_version }}
      - name: Test
        env:
          HOST: localhost
          USER: root
          PASSWORD: root
          DBNAME: root
          PORT: 5432
        run: go test -v main_test.go

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['ubuntu-latest', 'ubuntu-24.04']
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.18'
      - name: Build
        run: go build -v main.go

  docker:
    needs: build
    uses: ./.github/workflows/Docker.yml
    secrets: inherit
